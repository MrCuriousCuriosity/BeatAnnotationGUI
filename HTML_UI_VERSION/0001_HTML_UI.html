<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Beat Annotation GUI - Barebones HTML</title>
	<link rel="stylesheet" href="0002_HTML_UI_STYLES.css">
</head>
<body>
	<div class="app">
		<!-- Toolbar loaded from 0011_TopToolBar.html -->
		<div id="toolbarContainer"></div>
		<main class="workspace">
			<!-- Spectogram loaded from 0021_SPECTOGRAM.html -->
			<div id="spectrogramContainer"></div>
			<!-- MEI loaded from 0031_MEI.html -->
			<div id="meiContainer"></div>
		</main>
	</div>

	<input id="audioFileInput" type="file" accept="audio/*" hidden>
	<input id="meiFileInput" type="file" accept=".mei" hidden>

	<div class="modal-backdrop" id="settingsModalBackdrop" aria-hidden="true">
		<div id="settingsModalMount"></div>
	</div>

	<script src="https://unpkg.com/wavesurfer.js@7"></script>
	<script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/spectrogram.min.js"></script>
	<script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
	<script src="https://www.verovio.org/javascript/latest/verovio-toolkit.js"></script>
	<script src="0010_TopToolBar.js"></script>
	<script src="0022_SPECTOGRAM_SETTINGS.js"></script>
	<script src="0020_SPECTOGRAM_UI.js"></script>
	<script src="0030_MEI.js"></script>
</body>
</html>
